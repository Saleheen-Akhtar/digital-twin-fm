# Digital Twin FM — Local dev infrastructure
# Build images first:
#   docker build -f docker/web.Dockerfile -t dtfm-web .
#   docker build -f docker/api-gateway.Dockerfile -t dtfm-api .
#   docker build -f docker/ingestion-service.Dockerfile -t dtfm-ingestion .
#   docker build -f docker/ai-service.Dockerfile -t dtfm-ai .
#
# Then: docker compose up

services:
  # ── Infrastructure ────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: dtfm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dtfm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dtfm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-dtfm_user}", "-d", "${POSTGRES_DB:-dtfm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: dtfm-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --save
      - "60 1"
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --bind
      - 0.0.0.0
    volumes:
      - valkey_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: dtfm-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ── App services ──────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    image: dtfm-api
    container_name: dtfm-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-dtfm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dtfm_db}
      POSTGRES_SSL: "false"
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AI_SERVICE_URL: http://ai:8000
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - api-uploads:/app/apps/api-gateway/uploads

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_OUTPUT: standalone
    image: dtfm-web
    container_name: dtfm-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_OUTPUT: standalone
      API_GATEWAY_URL: http://api-gateway:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion-service.Dockerfile
    image: dtfm-ingestion
    container_name: dtfm-ingestion
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:4100"
    environment:
      NODE_ENV: production
      INGESTION_HOST: 0.0.0.0
      INGESTION_PORT: 4100
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      MQTT_URL: mqtt://mosquitto:1883
      INGESTION_LOG_LEVEL: info
    depends_on:
      valkey:
        condition: service_healthy
      mosquitto:
        condition: service_started

  ai:
    build:
      context: .
      dockerfile: docker/ai-service.Dockerfile
    image: dtfm-ai
    container_name: dtfm-ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      AI_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8000
      PYTHONUNBUFFERED: 1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      AI_CORS_ORIGIN: ${AI_CORS_ORIGIN:-http://localhost:3000}

  # Optional: Caddy reverse proxy (recommended for staging/prod)
  # caddy:
  #   image: caddy:2
  #   container_name: dtfm-caddy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config

volumes:
  postgres_data:
  valkey_data:
  mosquitto_data:
  mosquitto_log:
  api-uploads:
